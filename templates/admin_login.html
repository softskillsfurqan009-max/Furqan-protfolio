<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Login | Furqan Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0c10 0%, #1a1f2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }
        /* Animated background circles */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(239,68,68,0.15) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
            z-index: 0;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        /* Main card */
        .login-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 450px;
            animation: fadeUp 0.6s ease;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .glass-card {
            background: rgba(15, 25, 35, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(239, 68, 68, 0.4);
            padding: 2.2rem 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(239,68,68,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 55px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(59,130,246,0.3);
            border-color: rgba(59,130,246,0.5);
        }
        /* Header */
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .icon-circle {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #ef4444, #3b82f6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .icon-circle i {
            font-size: 2.2rem;
            color: white;
        }
        h2 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #fca5a5, #93c5fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .sub {
            color: #a0aec0;
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }
        /* Form */
        .input-group {
            margin-bottom: 1.5rem;
        }
        .input-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #fca5a5;
            letter-spacing: 0.3px;
        }
        .input-group label i {
            width: 20px;
            color: #ef4444;
        }
        .input-field {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(10, 12, 16, 0.7);
            border: 1px solid rgba(239, 68, 68, 0.5);
            border-radius: 1.2rem;
            color: white;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
            outline: none;
        }
        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
            background: rgba(10,12,16,0.9);
        }
        /* Button */
        .login-btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #dc2626, #2563eb);
            border: none;
            border-radius: 2rem;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            margin-top: 0.5rem;
            font-family: 'Inter', sans-serif;
        }
        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(37,99,235,0.4);
            gap: 15px;
        }
        /* Error message */
        .error-message {
            background: rgba(220, 38, 38, 0.2);
            border-left: 4px solid #ef4444;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            margin-top: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: #fecaca;
            backdrop-filter: blur(4px);
        }
        .error-message i {
            color: #ef4444;
            font-size: 1rem;
        }
        /* Footer links */
        .login-footer {
            margin-top: 1.8rem;
            text-align: center;
            font-size: 0.75rem;
            color: #6c757d;
        }
        .login-footer a {
            color: #93c5fd;
            text-decoration: none;
        }
        /* Responsive */
        @media (max-width: 500px) {
            .glass-card {
                padding: 1.5rem;
            }
            h2 {
                font-size: 1.6rem;
            }
            .icon-circle {
                width: 55px;
                height: 55px;
            }
            .icon-circle i {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="glass-card">
        <div class="login-header">
            <div class="icon-circle">
                <i class="fas fa-lock"></i>
            </div>
            <h2>Admin Access</h2>
            <div class="sub">Secure portal for portfolio management</div>
        </div>

        <form method="POST">
            <div class="input-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" name="username" class="input-field" placeholder="Enter username" required autofocus>
            </div>
            <div class="input-group">
                <label><i class="fas fa-key"></i> Password</label>
                <input type="password" name="password" class="input-field" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>

            {% if error %}
            <div class="error-message">
                <i class="fas fa-exclamation-triangle"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}
        </form>

        <div class="login-footer">
            <i class="fas fa-shield-alt"></i> Protected area — only authorized personnel
        </div>
    </div>
</div>
</body>
</html>
