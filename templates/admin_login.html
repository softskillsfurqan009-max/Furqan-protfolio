<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0c10; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: rgba(15,25,35,0.9); backdrop-filter: blur(12px); padding: 2rem; border-radius: 28px; border: 1px solid #ef4444; width: 320px; }
        h2 { color: #ef4444; text-align: center; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 0.8rem; margin: 0.5rem 0; background: rgba(0,0,0,0.5); border: 1px solid #ef4444; border-radius: 16px; color: white; }
        button { width: 100%; padding: 0.8rem; background: linear-gradient(135deg, #dc2626, #2563eb); border: none; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; }
        .error { color: #ef4444; text-align: center; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Admin Login</h2>
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
        </form>
    </div>
</body>
</html>
