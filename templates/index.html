<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Furqan Raza | Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%238b0000'/%3E%3Ctext x='50' y='70' font-size='50' text-anchor='middle' fill='%233b82f6' font-weight='bold'%3EF%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0c10 0%, #0f1219 100%);
            color: #f0f3fa;
            overflow-x: hidden;
        }
        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(10, 12, 16, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(239, 68, 68, 0.3);
            z-index: 100;
            padding: 1rem 2rem;
        }
        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ef4444, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: #e2e8f0;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            position: relative;
            padding: 0.4rem 0;
            cursor: pointer;
        }
        .nav-links a:before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #ef4444, #3b82f6);
            transition: width 0.3s ease;
        }
        .nav-links a:hover:before, .nav-links a.active:before {
            width: 100%;
        }
        .nav-links a:hover, .nav-links a.active {
            color: #ef4444;
        }
        .menu-icon {
            display: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: white;
        }
        /* Page Container */
        .page-container {
            padding: 100px 2rem 80px;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
            animation: fadeSlide 0.5s ease;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Home Page Layout */
        .home-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
            min-height: 80vh;
        }
        .home-left {
            text-align: left;
        }
        .about-small {
            font-size: 0.85rem;
            letter-spacing: 3px;
            color: #ef4444;
            font-weight: 500;
            margin-bottom: 1rem;
        }
        .name-large {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1.2rem;
            background: linear-gradient(135deg, #fff, #fca5a5);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .description {
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2rem;
            font-size: 1rem;
        }
        .tech-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }
        .tech-badge {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.4);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #fca5a5;
        }
        .stats-row {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .stat-item {
            text-align: left;
        }
        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ef4444;
            line-height: 1.2;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            letter-spacing: 0.5px;
        }
        .action-buttons {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .btn-link {
            background: none;
            border: none;
            color: #e2e8f0;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            padding: 0.5rem 0;
            transition: color 0.3s;
            font-family: inherit;
        }
        .btn-link:hover {
            color: #ef4444;
        }
        .home-right {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .profile-pic-large {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            border: 4px solid #ef4444;
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.3);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .profile-pic-large:hover {
            transform: scale(1.02);
            box-shadow: 0 0 55px rgba(239, 68, 68, 0.5);
        }
        .profile-pic-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Other sections */
        .section-title {
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 2.5rem;
            display: inline-block;
            background: linear-gradient(120deg, #FFF, #fca5a5, #93c5fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
        }
        .section-title:after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 70px;
            height: 4px;
            background: linear-gradient(90deg, #ef4444, #3b82f6);
            border-radius: 4px;
        }
        .glass-card {
            background: rgba(15, 25, 35, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 1.8rem;
            transition: all 0.4s;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            margin-bottom: 2rem;
        }
        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(59,130,246,0.5);
        }
        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1rem;
        }
        .skill-tag {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(59,130,246,0.5);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            font-size: 0.9rem;
            transition: all 0.25s;
        }
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        .info-list li {
            margin: 0.8rem 0;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .info-list i {
            width: 28px;
            color: #ef4444;
        }
        .exp-title, .edu-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fca5a5;
        }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        .project-card a {
            text-decoration: none;
            color: #93c5fd;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 1rem;
            transition: gap 0.3s;
        }
        .project-card a:hover {
            gap: 12px;
            color: #ef4444;
        }
        .contact-icons {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .contact-icon {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.5);
            transition: all 0.3s;
            text-decoration: none;
            background: rgba(15,25,35,0.7);
        }
        .contact-icon:hover {
            transform: translateY(-5px);
            color: #3b82f6;
            border-color: #3b82f6;
        }
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .form-group input, .form-group textarea {
            background: rgba(10,12,16,0.7);
            border: 1px solid rgba(239,68,68,0.5);
            border-radius: 16px;
            padding: 0.8rem 1rem;
            color: white;
            width: 100%;
            font-family: inherit;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .submit-btn {
            background: linear-gradient(135deg, #dc2626, #2563eb);
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }
        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid rgba(239,68,68,0.2);
            background: transparent;
            font-size: 0.85rem;
        }
        @media (max-width: 900px) {
            .home-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
                text-align: center;
            }
            .home-left {
                text-align: center;
            }
            .stats-row {
                justify-content: center;
            }
            .stat-item {
                text-align: center;
            }
            .action-buttons {
                justify-content: center;
            }
            .tech-badges {
                justify-content: center;
            }
            .profile-pic-large {
                width: 250px;
                height: 250px;
            }
            .name-large {
                font-size: 2.5rem;
            }
        }
        @media (max-width: 768px) {
            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                align-items: center;
                gap: 1rem;
                margin-top: 1rem;
            }
            .nav-links.active {
                display: flex;
            }
            .menu-icon {
                display: block;
            }
            .two-col {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="navbar">
    <div class="nav-container">
        <div class="logo">Furqan Raza</div>
        <div class="menu-icon" id="menu-toggle"><i class="fas fa-bars"></i></div>
        <ul class="nav-links" id="nav-links">
            <li><a data-page="home" class="nav-link active">Home</a></li>
            <li><a data-page="about" class="nav-link">About</a></li>
            <li><a data-page="skills" class="nav-link">Skills</a></li>
            <li><a data-page="experience" class="nav-link">Experience</a></li>
            <li><a data-page="education" class="nav-link">Education</a></li>
            <li><a data-page="projects" class="nav-link">Projects</a></li>
            <li><a data-page="contact" class="nav-link">Contact</a></li>
        </ul>
    </div>
</div>
<main id="page-root" class="page-container"></main>
<footer>© 2026 Furqan Raza — Modern Portfolio</footer>

<script>
    let siteData = {};
    let currentPage = 'home';

    async function loadData() {
        try {
            const res = await fetch('/api/data');
            siteData = await res.json();
            renderPage(currentPage);
        } catch(e) {
            console.error('Failed to load data, using fallback', e);
            siteData = {
                home: { title: "Furqan Raza", tagline: "Aspiring Web Developer | Frontend Expert | Full-Stack", description: "Building responsive, user-centric web apps..." },
                about: { who: "A highly motivated and detail-oriented aspiring Web Developer...", personal: { dob: "07-12-2007", nationality: "Pakistani", languages: "English, Urdu", interests: "Skill Learning, Technology" } },
                skills: ["HTML5/CSS3", "JavaScript", "React.js", "Node.js", "Supabase", "Tailwind CSS", "Git", "Python"],
                experience: [ { title: "Web Developer Intern", company: "21 Group Of Companies", desc: "Building responsive web applications..." } ],
                education: [ { degree: "BS Software Engineering", institute: "Virtual University" } ],
                projects: [ { name: "Dynamic Portfolio", desc: "Modern portfolio", link: "#" } ]
            };
            renderPage(currentPage);
        }
    }

    function renderPage(page) {
        currentPage = page;
        const root = document.getElementById('page-root');
        if (page === 'home') {
            const skillsList = siteData.skills || ["CSS & JavaScript", "Speed Optimization", "React / Next.js"];
            const topSkills = skillsList.slice(0, 3);
            const projectCount = (siteData.projects || []).length;
            const yearStarted = "2026";
            const projectsDone = projectCount > 0 ? projectCount + "+" : "3+";
            const pagespeedAvg = "98+";
            const countriesServed = "18+";
            
            root.innerHTML = `
                <div class="home-grid">
                    <div class="home-left">
                        <div class="about-small">ABOUT ME</div>
                        <div class="name-large">I'm Furqan Raza</div>
                        <div class="description">Freelance web developer based in Rawalpindi. I build fast, conversion-focused websites for businesses that want real results — not just a pretty page.</div>
                        <div class="tech-badges">
                            ${topSkills.map(skill => `<span class="tech-badge">${skill}</span>`).join('')}
                        </div>
                        <div class="stats-row">
                            <div class="stat-item">
                                <div class="stat-number">${yearStarted}</div>
                                <div class="stat-label">YEAR STARTED</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number">${projectsDone}</div>
                                <div class="stat-label">PROJECTS DONE</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number">${pagespeedAvg}</div>
                                <div class="stat-label">PAGESPEED AVG</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number">${countriesServed}</div>
                                <div class="stat-label">COUNTRIES SERVED</div>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn-link" data-nav="projects">See My Work →</button>
                            <button class="btn-link" data-nav="contact">Contact Me →</button>
                        </div>
                    </div>
                    <div class="home-right">
                        <div class="profile-pic-large">
                            <img src="/static/pic-img.png" alt="Furqan Raza">
                        </div>
                    </div>
                </div>
            `;
        } else if (page === 'about') {
            root.innerHTML = `<h2 class="section-title">About Me</h2><div class="two-col"><div class="glass-card"><h3><i class="fas fa-user-astronaut"></i> Who I Am</h3><p>${siteData.about.who}</p><div class="skills-grid"><span class="skill-tag">Problem Solving</span><span class="skill-tag">Team Collaboration</span><span class="skill-tag">Communication</span><span class="skill-tag">Debugging Expert</span></div></div><div class="glass-card"><h3><i class="fas fa-id-card"></i> Personal Info</h3><ul class="info-list"><li><i class="fas fa-calendar-alt"></i> DOB: ${siteData.about.personal.dob}</li><li><i class="fas fa-flag"></i> Nationality: ${siteData.about.personal.nationality}</li><li><i class="fas fa-language"></i> Languages: ${siteData.about.personal.languages}</li><li><i class="fas fa-heart"></i> Interests: ${siteData.about.personal.interests}</li></ul></div></div>`;
        } else if (page === 'skills') {
            root.innerHTML = `<h2 class="section-title">Technical Arsenal</h2><div class="glass-card"><div class="skills-grid">${siteData.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div><div style="margin-top:1rem;"><p><i class="fas fa-chart-line"></i> <strong>Expertise:</strong> Frontend (Expert), Backend (Basic), Full-stack, DB Management</p></div></div>`;
        } else if (page === 'experience') {
            let html = `<h2 class="section-title">Work Experience</h2>`;
            siteData.experience.forEach(exp => {
                html += `<div class="glass-card"><div class="exp-title">${exp.title}</div><div class="exp-company"><i class="fas fa-briefcase"></i> ${exp.company}</div><div class="exp-desc">${exp.desc}</div></div>`;
            });
            root.innerHTML = html;
        } else if (page === 'education') {
            let html = `<h2 class="section-title">Academic Journey</h2><div class="glass-card">`;
            siteData.education.forEach(edu => {
                html += `<div class="edu-item"><div class="edu-title">${edu.degree}</div><div class="edu-institute"><i class="fas fa-university"></i> ${edu.institute}</div></div>`;
            });
            html += `</div>`;
            root.innerHTML = html;
        } else if (page === 'projects') {
            let html = `<h2 class="section-title">Featured Projects</h2><div class="projects-grid">`;
            if (siteData.projects && siteData.projects.length > 0) {
                siteData.projects.forEach(proj => {
                    html += `<div class="glass-card project-card"><i class="fas fa-globe" style="font-size:2rem;color:#ef4444;"></i><h3>${proj.name}</h3><p>${proj.desc}</p><a href="${proj.link}" target="_blank">Live Demo <i class="fas fa-external-link-alt"></i></a></div>`;
                });
            } else {
                html += `<div class="glass-card"><p>No projects added yet. Use admin panel to add projects.</p></div>`;
            }
            html += `</div>`;
            root.innerHTML = html;
        } else if (page === 'contact') {
            root.innerHTML = `<h2 class="section-title">Get In Touch</h2><div class="glass-card"><div class="contact-icons"><a href="mailto:rfurqan009@gmail.com" class="contact-icon"><i class="fas fa-envelope"></i></a><a href="tel:03195208184" class="contact-icon"><i class="fas fa-phone-alt"></i></a><a href="https://github.com/furqan-dev" class="contact-icon" target="_blank"><i class="fab fa-github"></i></a><a href="#" class="contact-icon" id="collabIcon"><i class="fab fa-linkedin"></i></a></div><h3 style="margin-bottom:1rem; text-align:center;"><i class="fas fa-paper-plane"></i> Send a Message</h3><form id="contactForm" class="contact-form"><div class="form-group"><label>Your Name</label><input type="text" id="formName" required></div><div class="form-group"><label>Email</label><input type="email" id="formEmail" required></div><div class="form-group"><label>Message</label><textarea id="formMsg" rows="4" required></textarea></div><button type="submit" class="submit-btn">Send Message <i class="fas fa-arrow-right"></i></button><div id="formStatus" style="display:none; margin-top:1rem; padding:0.5rem; border-radius:10px;"></div></form></div>`;
            const form = document.getElementById('contactForm');
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const fd = new FormData();
                    fd.append('name', document.getElementById('formName').value);
                    fd.append('email', document.getElementById('formEmail').value);
                    fd.append('message', document.getElementById('formMsg').value);
                    const res = await fetch('/api/contact', { method: 'POST', body: fd });
                    const status = document.getElementById('formStatus');
                    if (res.ok) {
                        status.style.display = 'block';
                        status.style.background = 'rgba(59,130,246,0.2)';
                        status.style.borderLeft = '3px solid #3b82f6';
                        status.innerHTML = '<i class="fas fa-check"></i> Message sent! I will reply soon.';
                        form.reset();
                        setTimeout(() => status.style.display = 'none', 4000);
                    } else {
                        status.style.display = 'block';
                        status.style.background = 'rgba(239,68,68,0.2)';
                        status.style.borderLeft = '3px solid #ef4444';
                        status.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error sending message.';
                    }
                });
            }
            const collab = document.getElementById('collabIcon');
            if (collab) collab.addEventListener('click', (e) => { e.preventDefault(); alert('Connect on LinkedIn: https://www.linkedin.com/in/furqan-dev'); });
        }
        // update active nav
        document.querySelectorAll('.nav-link').forEach(link => {
            if (link.dataset.page === page) link.classList.add('active');
            else link.classList.remove('active');
        });
        // re-attach data-nav buttons
        document.querySelectorAll('[data-nav]').forEach(btn => btn.addEventListener('click', () => renderPage(btn.dataset.nav)));
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    loadData();

    // Navigation and mobile menu
    document.querySelectorAll('.nav-link').forEach(link => link.addEventListener('click', (e) => {
        e.preventDefault();
        renderPage(link.dataset.page);
        document.getElementById('nav-links')?.classList.remove('active');
    }));
    document.getElementById('menu-toggle').addEventListener('click', () => {
        document.getElementById('nav-links').classList.toggle('active');
    });
</script>
</body>
</html>
